/* ─── Components ─── */

function Badge({ status, color }) {
  const map = { done: { bg: C.greenSoft, c: C.green, t: '✓ Done' }, active: { bg: color ? `${color}22` : C.accentSoft, c: color || C.accent, t: '● Active' }, planned: { bg: C.surfaceAlt, c: C.textMuted, t: '○ Planned' }, todo: { bg: C.surfaceAlt, c: C.textMuted, t: '○' } };
  const m = map[status] || map.planned;
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '3px 10px', borderRadius: 20, background: m.bg, color: m.c, fontSize: 11, fontWeight: 600, letterSpacing: 0.3 }}>{m.t}</span>;
}

function StatCard({ s }) {
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '20px 18px', display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{ fontSize: 13, color: C.textMuted }}>{s.icon}</span>
      <span style={{ fontSize: 28, fontWeight: 700, color: C.text, fontFamily: "'JetBrains Mono', monospace" }}>{s.value}</span>
      <span style={{ fontSize: 12, color: C.textSec }}>{s.labelEn}</span>
      <span style={{ fontSize: 11, color: C.textMuted }}>{s.label}</span>
    </div>
  );
}

function MilestoneCard({ m, expanded, onToggle }) {
  const doneCount = m.tasks.filter(t => t.s === 'done').length;
  const pct = Math.round((doneCount / m.tasks.length) * 100);

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, overflow: 'hidden', transition: 'border-color 0.2s' }}
      onMouseEnter={e => e.currentTarget.style.borderColor = m.color + '44'}
      onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
      <div onClick={onToggle} style={{ padding: '24px 28px', cursor: 'pointer', userSelect: 'none' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 20, fontWeight: 700, color: m.color, fontFamily: "'JetBrains Mono', monospace" }}>{m.version}</span>
            <Badge status={m.status} color={m.color} />
          </div>
          <span style={{ fontSize: 12, color: C.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>{m.date}</span>
        </div>
        <div style={{ marginBottom: 6 }}>
          <span style={{ fontSize: 16, fontWeight: 600, color: C.text }}>{m.titleZh}</span>
          <span style={{ fontSize: 13, color: C.textMuted, marginLeft: 10 }}>{m.title}</span>
        </div>
        <p style={{ fontSize: 13, color: C.textSec, lineHeight: 1.6, marginBottom: 14 }}>{m.summaryZh}</p>
        {/* Progress bar */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ flex: 1, height: 4, background: C.surfaceAlt, borderRadius: 2, overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${pct}%`, background: m.color, borderRadius: 2, transition: 'width 0.4s ease' }}></div>
          </div>
          <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "'JetBrains Mono', monospace", minWidth: 60, textAlign: 'right' }}>{doneCount}/{m.tasks.length} ({pct}%)</span>
          <span style={{ fontSize: 14, color: C.textMuted, transition: 'transform 0.2s', transform: expanded ? 'rotate(180deg)' : 'rotate(0)' }}>▾</span>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: '0 28px 24px', borderTop: `1px solid ${C.border}` }}>
          <div style={{ paddingTop: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {m.tasks.map((task, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0' }}>
                <span style={{
                  width: 18, height: 18, borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  fontSize: 10, fontWeight: 700,
                  background: task.s === 'done' ? C.greenSoft : C.surfaceAlt,
                  color: task.s === 'done' ? C.green : C.textMuted,
                  border: `1px solid ${task.s === 'done' ? C.green + '33' : C.border}`,
                }}>{task.s === 'done' ? '✓' : ''}</span>
                <span style={{ fontSize: 13, color: task.s === 'done' ? C.textSec : C.text, textDecoration: task.s === 'done' ? 'line-through' : 'none', textDecorationColor: C.textMuted }}>{task.t}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ArchDiagram() {

    <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>

              <div style={{ fontSize: 13, fontWeight: 700, color: layer.color }}>{layer.label}</div>
              <div style={{ fontSize: 11, color: C.textMuted }}>{layer.labelEn}</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {layer.items.map((item, j) => (
                <span key={j} style={{ padding: '4px 10px', borderRadius: 6, background: C.surfaceAlt, border: `1px solid ${C.border}`, color: C.textSec, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>{item}</span>
              ))}
            </div>
          </div>
          {i < ARCH_LAYERS.length - 1 && (
            <div style={{ display: 'flex', justifyContent: 'center', padding: '2px 0' }}>
              <span style={{ color: C.textMuted, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>↕ IPC / COM</span>

        <span style={{ color: C.textSec }}>Natural-language driven SolidWorks automation. Zero plugins. Any AI backend.</span>

      {/* Tabs */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 32, borderBottom: `1px solid ${C.border}`, paddingBottom: 0 }}>
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{
            padding: '10px 20px', background: 'none', border: 'none', cursor: 'pointer',

      {tab === 'roadmap' && (
        <>

          {sectionTitle('版本路线图', 'Release Roadmap')}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {MILESTONES.map((m, i) => (
              <MilestoneCard key={i} m={m} expanded={expanded[i]} onToggle={() => toggleExpand(i)} />
            ))}
          </div>

          {/* Timeline visual */}
          {sectionTitle('时间线', 'Timeline')}
          <div style={{ display: 'flex', alignItems: 'center', gap: 0, padding: '0 8px' }}>
            {MILESTONES.map((m, i) => (
              <React.Fragment key={i}>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, minWidth: 80 }}>
                  <div style={{
                    width: 14, height: 14, borderRadius: '50%',
                    background: m.status === 'done' ? m.color : m.status === 'active' ? m.color : C.surfaceAlt,

                    boxShadow: m.status === 'active' ? `0 0 12px ${m.color}44` : 'none',
                  }}></div>

                  <span style={{ fontSize: 10, color: C.textMuted }}>{m.date}</span>

                <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 2 }}>{g.cat}</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 10 }}>{g.catEn}</div>

            <div><span style={{ color: C.accent }}>User Input</span> → <span style={{ color: C.textMuted }}>ChatInput.tsx</span></div>
            <div style={{ paddingLeft: 20 }}>→ <span style={{ color: C.amber }}>window.api.llm.chatStream()</span> <span style={{ color: C.textMuted }}>// IPC</span></div>
            <div style={{ paddingLeft: 40 }}>→ <span style={{ color: C.green }}>BaseLLMAdapter.chatStream()</span> <span style={{ color: C.textMuted }}>// fetch + SSE</span></div>
            <div style={{ paddingLeft: 60 }}>→ <span style={{ color: C.purple }}>AI Provider</span> <span style={{ color: C.textMuted }}>// Anthropic / OpenAI / etc.</span></div>
            <div style={{ paddingLeft: 40 }}>← <span style={{ color: C.green }}>AsyncIterable&lt;LLMStreamEvent&gt;</span></div>
            <div style={{ paddingLeft: 20 }}>← <span style={{ color: C.amber }}>webContents.send()</span> <span style={{ color: C.textMuted }}>// stream delta</span></div>
            <div>← <span style={{ color: C.accent }}>ChatMessage.tsx</span> <span style={{ color: C.textMuted }}>// render + code block</span></div>
            <div style={{ marginTop: 8, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>
              <span style={{ color: C.red }}>Execute</span> → <span style={{ color: C.green }}>engine.ts</span> → <span style={{ color: C.amber }}>sanitizer.ts</span> → <span style={{ color: C.green }}>backup.ts</span> → <span style={{ color: C.purple }}>cscript.exe</span> → <span style={{ color: C.cyan }}>SolidWorks COM</span>
            </div>
          </div>
        </>
      )}

      {tab === 'contribute' && (
        <>
          {sectionTitle('贡献方向', 'Ways to Contribute')}
          <ContributorSection />

          {sectionTitle('快速开始', 'Quick Start for Contributors')}
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '24px', fontFamily: "'JetBrains Mono', monospace", fontSize: 12, lineHeight: 2, color: C.textSec }}>
            <div style={{ color: C.textMuted, marginBottom: 4 }}># Clone & setup</div>
            <div><span style={{ color: C.green }}>$</span> git clone https://github.com/raylanlin/sw-copilot.git</div>
            <div><span style={{ color: C.green }}>$</span> cd sw-copilot && npm install</div>
            <div><span style={{ color: C.green }}>$</span> cp .env.example .env  <span style={{ color: C.textMuted }}># configure API keys</span></div>
            <div style={{ color: C.textMuted, marginTop: 8, marginBottom: 4 }}># Dev mode (no SolidWorks needed)</div>
            <div><span style={{ color: C.green }}>$</span> SKIP_SW_CONNECT=true npm run dev</div>
            <div style={{ color: C.textMuted, marginTop: 8, marginBottom: 4 }}># Run tests</div>
            <div><span style={{ color: C.green }}>$</span> npm run build:main && npm test</div>
          </div>

          {sectionTitle('新增 SW 工具流程', 'Adding a New SW Tool')}
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '20px 24px' }}>
            {[
              { step: '1', text: 'shared/sw-tools.ts 的 SW_TOOLS 加定义', file: 'sw-tools.ts' },
              { step: '2', text: 'scripts/generators/<category>.ts 加实现', file: 'generators/*.ts' },
              { step: '3', text: 'scripts/generators/index.ts 的 REGISTRY 映射', file: 'index.ts' },
              { step: '4', text: '测试自动覆盖 (generators.test.mjs 会检查)', file: 'tests/' },
            ].map((s, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '10px 0', borderBottom: i < 3 ? `1px solid ${C.border}` : 'none' }}>
                <span style={{ width: 26, height: 26, borderRadius: 7, background: C.accentSoft, color: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{s.step}</span>
                <span style={{ fontSize: 13, color: C.text, flex: 1 }}>{s.text}</span>
                <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>{s.file}</span>
              </div>
            ))}
          </div>

          {sectionTitle('Git 规范', 'Git Conventions')}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '16px 20px' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 10 }}>分支命名 Branch Naming</div>
              {['feat/xxx', 'fix/xxx', 'docs/xxx', 'chore/xxx'].map((b, i) => (
                <div key={i} style={{ padding: '3px 0', fontSize: 12, color: C.textSec, fontFamily: "'JetBrains Mono', monospace" }}>{b}</div>
              ))}
            </div>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '16px 20px' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 10 }}>提交格式 Commit Format</div>
              <div style={{ fontSize: 12, color: C.textSec, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.8 }}>
                <div><span style={{ color: C.green }}>feat</span>: add new tool</div>
                <div><span style={{ color: C.red }}>fix</span>: vbs encoding</div>
                <div><span style={{ color: C.accent }}>docs</span>: update readme</div>
                <div><span style={{ color: C.amber }}>chore</span>: bump deps</div>
              </div>
            </div>
          </div>
        </>
      )}

      {/* Footer */}
      <div style={{ marginTop: 64, paddingTop: 24, borderTop: `1px solid ${C.border}`, textAlign: 'center' }}>
        <span style={{ fontSize: 12, color: C.textMuted }}>SW Copilot · MIT + Commons Clause · </span>
        <a href="https://github.com/raylanlin/sw-copilot" target="_blank" rel="noopener" style={{ fontSize: 12, color: C.accent, textDecoration: 'none' }}>GitHub</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
