appId: com.swcopilot.app
productName: SW Copilot
copyright: Copyright © 2026 SW Copilot Contributors

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.ts'
  - '!src'
  - '!tests'
  - '!docs'
  - '!*.md'
  - '!tsconfig*.json'
  - '!vite.config.ts'
  - '!.env*'

# P3：把 Python 边车代码随安装包/免安装版一起出去
# sw-sidecar.ts 默认 cwd = resourcesPath/sidecar（见其构造）
extraResources:
  - from: 'sidecar'
    to: 'sidecar'
    filter:
      - '**/*'

win:
  # 只保留 NSIS。移除 squirrel —— 它会在安装后自动后台拉起应用，
  # 导致随后的 NSIS 安装器发现进程关不掉，弹「无法关闭，请手动关闭」并反复重试。
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  artifactName: '${productName}-Setup-${version}-${arch}.${ext}'

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  # 安装前强制结束仍在运行的实例，避免文件占用 / 关不掉的重试循环
  # （electron-builder 自带该逻辑，perMachine:false + 单实例即可，保留默认）

squirrelWindows: null

publish:
  provider: github
  owner: raylanlin
  repo: sw-copilot
