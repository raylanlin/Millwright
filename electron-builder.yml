appId: com.millwright.app
productName: Millwright
copyright: Copyright © 2026 Millwright Contributors

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.ts'
  - '!src'
  - '!tests'
  - '!docs'
  - '!*.md'
  - '!tsconfig*.json'
  - '!vite.config.ts'
  - '!.env*'

# P3: ship the Python sidecar alongside the installer / portable build.
# sw-sidecar.ts defaults its cwd to resourcesPath/sidecar (see its constructor).
extraResources:
  - from: 'sidecar'
    to: 'sidecar'
    filter:
      - '**/*'

win:
  # NSIS only. Squirrel was removed — it auto-launches the app in the background
  # after install, which then makes the NSIS installer unable to close the running
  # process, popping "cannot close, please close manually" in a retry loop.
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  artifactName: '${productName}-Setup-${version}-${arch}.${ext}'

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  # Force-terminate any running instance before install to avoid file locks /
  # the unclosable-retry loop (electron-builder handles this with
  # perMachine:false + single-instance; defaults kept).

squirrelWindows: null

publish:
  provider: github
  owner: raylanlin
  repo: millwright
