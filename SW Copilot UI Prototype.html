<!-- ⚠️ ARCHIVED: Historical UI prototype reference (v2, 2026-04-28). See src/renderer/ for production UI. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SW Copilot — UI Prototype v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: #0f1117; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2e40; border-radius: 3px; }
  textarea::placeholder, input::placeholder { color: #6b7280; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useEffect, useCallback } = React;

/* ═══ Color Tokens ═══ */
const B = { blue: '#2563eb', blueL: '#3b82f6', green: '#10b981', red: '#ef4444', gold: '#f59e0b' };

const T = {
  dark: {
    bg:'#0f1117', sidebar:'#161822', sBorder:'#232636',
    card:'#1a1d2b', cBorder:'#262a3a', cAlt:'#141622', cHover:'#1e2132',
    inBg:'#141622', inBorder:'#2a2e40',
    text:'#e5e7eb', tSec:'#9ca3af', tMut:'#4b5563',
    accent:B.blueL, aSoft:'rgba(59,130,246,0.12)',
    uBub:B.blueL, uBubT:'#fff', aBub:'#1a1d2b', aBubB:'#262a3a',
    codeBg:'#0d0f16', codeB:'#1e2130', codeT:'#a6e3a1',
    toolBg:'rgba(59,130,246,0.10)', toolB:'rgba(59,130,246,0.18)', toolT:'#60a5fa',
    btn:B.blueL, btnT:'#fff', modal:'rgba(0,0,0,0.6)', modalBg:'#1a1d2b',
    hdr:'rgba(15,17,23,0.85)', sucBg:'rgba(16,185,129,0.10)', sucT:'#34d399',
  },
  light: {
    bg:'#f5f6f8', sidebar:'#fff', sBorder:'#e5e7eb',
    card:'#fff', cBorder:'#e5e7eb', cAlt:'#f9fafb', cHover:'#f3f4f6',
    inBg:'#fff', inBorder:'#d1d5db',
    text:'#111827', tSec:'#4b5563', tMut:'#9ca3af',
    accent:B.blue, aSoft:'rgba(37,99,235,0.10)',
    uBub:'#111827', uBubT:'#fff', aBub:'#fff', aBubB:'#e5e7eb',
    codeBg:'#1e1e2e', codeB:'#313244', codeT:'#a6e3a1',
    toolBg:'rgba(37,99,235,0.08)', toolB:'rgba(37,99,235,0.15)', toolT:B.blue,
    btn:B.blue, btnT:'#fff', modal:'rgba(0,0,0,0.4)', modalBg:'#fff',
    hdr:'rgba(255,255,255,0.85)', sucBg:'rgba(16,185,129,0.10)', sucT:'#059669',
  },
};

/* ═══ Tiny SVG Icons ═══ */
const Ic = {
  chat: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3.5A1.5 1.5 0 013.5 2h9A1.5 1.5 0 0114 3.5v7a1.5 1.5 0 01-1.5 1.5H5l-3 2v-2H3.5A1.5 1.5 0 012 10.5v-7z" stroke={c} strokeWidth="1.3" strokeLinejoin="round"/></svg>,
  bolt: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 2L4 9h4l-1 5 5-7H8l1-5z" stroke={c} strokeWidth="1.3" strokeLinejoin="round"/></svg>,
  tool: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.5 2.5a3 3 0 00-4.24 4.24L3 10l1 1 1 1 3.26-3.26A3 3 0 0010.5 2.5z" stroke={c} strokeWidth="1.3" strokeLinejoin="round"/></svg>,
  gear: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke={c} strokeWidth="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke={c} strokeWidth="1"/></svg>,
  moon: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5a5.5 5.5 0 01-7-7 5.5 5.5 0 107 7z" stroke={c} strokeWidth="1.3"/></svg>,
  sun: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke={c} strokeWidth="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke={c} strokeWidth="1"/></svg>,
  plus: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke={c} strokeWidth="1.5" strokeLinecap="round"/></svg>,
  send: c => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 2L7 9M14 2l-4 12-3-5-5-3 12-4z" stroke={c} strokeWidth="1.3" strokeLinejoin="round"/></svg>,
  copy: c => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke={c} strokeWidth="1.2"/><path d="M10 4V2.5A1.5 1.5 0 008.5 1h-6A1.5 1.5 0 001 2.5v6A1.5 1.5 0 002.5 10H4" stroke={c} strokeWidth="1.2"/></svg>,
  play: c => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 2.5l9 4.5-9 4.5V2.5z" fill={c}/></svg>,
  check: c => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-6" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  clock: c => <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke={c} strokeWidth="1.2"/><path d="M8 5v3.5l2.5 1.5" stroke={c} strokeWidth="1.2" strokeLinecap="round"/></svg>,
};

function Dot({ on, sz = 7 }) {
  const col = on ? B.green : B.red;
  return <span style={{ display:'inline-block', width:sz, height:sz, borderRadius:'50%', flexShrink:0, background:col, boxShadow:`0 0 6px ${col}66` }} />;
}

/* ═══ Sidebar ═══ */
function Sidebar({ t, theme, activeTab, onTab, onSettings, onTheme }) {
  const tabs = [
    { k:'chat', ic:Ic.chat, l:'对话' },
    { k:'automations', ic:Ic.bolt, l:'自动化' },
    { k:'tools', ic:Ic.tool, l:'工具' },
  ];
  const hist = ['批量修改圆角半径', '导出零件 STEP + PDF', '前视面画矩形拉伸'];

  return (
    <div style={{ width:260, background:t.sidebar, borderRight:`1px solid ${t.sBorder}`, display:'flex', flexDirection:'column', flexShrink:0 }}>
      {/* Logo */}
      <div style={{ padding:'16px 18px', display:'flex', alignItems:'center', gap:10, borderBottom:`1px solid ${t.sBorder}` }}>
        <img src="assets/icon-256.png" alt="" style={{ width:32, height:32, borderRadius:8 }} />
        <div>
          <div style={{ fontSize:14, fontWeight:700, color:t.text, letterSpacing:-0.3 }}>SW Copilot</div>
          <div style={{ fontSize:10, color:t.tMut }}>SolidWorks AI Assistant</div>
        </div>
      </div>

      {/* New Chat */}
      <div style={{ padding:'12px 12px 4px' }}>
        <button style={{ width:'100%', padding:'9px 14px', borderRadius:8, border:`1px dashed ${t.sBorder}`, background:'transparent', color:t.tSec, fontSize:12, cursor:'pointer', display:'flex', alignItems:'center', gap:8, fontFamily:'inherit' }}>
          {Ic.plus(t.tMut)} 新对话 New Chat
        </button>
      </div>

      {/* Tabs */}
      <div style={{ padding:'8px 12px 0' }}>
        {tabs.map(tab => (
          <button key={tab.k} onClick={() => onTab(tab.k)} style={{
            width:'100%', padding:'8px 12px', borderRadius:8, border:'none', cursor:'pointer', textAlign:'left',
            background: activeTab === tab.k ? t.aSoft : 'transparent',
            color: activeTab === tab.k ? t.accent : t.tSec,
            fontSize:13, fontWeight: activeTab === tab.k ? 600 : 400, marginBottom:2,
            display:'flex', alignItems:'center', gap:10, fontFamily:'inherit',
          }}>{tab.ic(activeTab === tab.k ? t.accent : t.tMut)} {tab.l}</button>
        ))}
      </div>

      {/* History */}
      <div style={{ flex:1, overflowY:'auto', padding:'10px 12px' }}>
        <div style={{ fontSize:10, fontWeight:600, color:t.tMut, padding:'8px 6px 6px', letterSpacing:0.8, textTransform:'uppercase' }}>History</div>
        {hist.map((h, i) => (
          <button key={i} style={{
            width:'100%', padding:'7px 10px', borderRadius:7, border:'none', cursor:'pointer', textAlign:'left',
            background: i === 0 ? t.cHover : 'transparent', color: i === 0 ? t.text : t.tSec,
            fontSize:12, marginBottom:1, display:'flex', alignItems:'center', gap:8, fontFamily:'inherit',
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
          }}>{Ic.clock(t.tMut)} <span style={{ overflow:'hidden', textOverflow:'ellipsis' }}>{h}</span></button>
        ))}
      </div>

      {/* Status + buttons */}
      <div style={{ padding:'10px 14px', borderTop:`1px solid ${t.sBorder}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:5 }}>
          <Dot on={true} /> <span style={{ fontSize:11, color:t.tSec }}>SolidWorks 已连接</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:12 }}>
          <Dot on={true} /> <span style={{ fontSize:11, color:t.tSec }}>Anthropic · claude-sonnet</span>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          <button onClick={onTheme} style={{ flex:1, padding:'7px', borderRadius:7, border:`1px solid ${t.sBorder}`, background:'transparent', color:t.tSec, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:5, fontSize:11, fontFamily:'inherit' }}>
            {theme === 'light' ? Ic.moon(t.tSec) : Ic.sun(t.tSec)} {theme === 'light' ? '暗色' : '亮色'}
          </button>
          <button onClick={onSettings} style={{ flex:1, padding:'7px', borderRadius:7, border:`1px solid ${t.sBorder}`, background:'transparent', color:t.tSec, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:5, fontSize:11, fontFamily:'inherit' }}>
            {Ic.gear(t.tSec)} 设置
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══ Chat Message ═══ */
function Msg({ m, t }) {
  const u = m.role === 'user';
  return (
    <div style={{ display:'flex', justifyContent: u ? 'flex-end' : 'flex-start', marginBottom:16, padding: u ? '0 0 0 80px' : '0 80px 0 0' }}>
      <div style={{
        maxWidth:'100%', padding: u ? '10px 16px' : '14px 18px',
        borderRadius: u ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
        background: u ? t.uBub : t.aBub, color: u ? t.uBubT : t.text,
        border: u ? 'none' : `1px solid ${t.aBubB}`,
        fontSize:13, lineHeight:1.7, whiteSpace:'pre-wrap',
      }}>
        {!u && m.tools && (
          <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:10 }}>
            {m.tools.map((tc, i) => (
              <span key={i} style={{ padding:'3px 9px', borderRadius:6, background:t.toolBg, color:t.toolT, fontSize:11, fontWeight:500, fontFamily:"'JetBrains Mono', monospace", border:`1px solid ${t.toolB}` }}>{tc}</span>
            ))}
          </div>
        )}
        {m.code && (
          <div style={{ background:t.codeBg, borderRadius:8, padding:'14px 16px', marginBottom:10, border:`1px solid ${t.codeB}`, fontFamily:"'JetBrains Mono', monospace", fontSize:11.5, color:t.codeT, overflowX:'auto', lineHeight:1.7, position:'relative' }}>
            <div style={{ position:'absolute', top:8, right:8, display:'flex', gap:4 }}>
              <button style={{ background:'rgba(255,255,255,0.08)', border:'none', borderRadius:5, padding:'4px 7px', cursor:'pointer', display:'flex', alignItems:'center', gap:4, color:'#9ca3af', fontSize:10 }}>{Ic.copy('#9ca3af')} Copy</button>
              <button style={{ background:'rgba(16,185,129,0.15)', border:'none', borderRadius:5, padding:'4px 8px', cursor:'pointer', display:'flex', alignItems:'center', gap:4, color:B.green, fontSize:10 }}>{Ic.play(B.green)} Run</button>
            </div>
            <div style={{ color:'#6b7280', fontSize:10, marginBottom:6 }}>VBA</div>
            {m.code}
          </div>
        )}
        {m.content}
        {m.status && (
          <div style={{ marginTop:8, padding:'6px 10px', borderRadius:6, fontSize:12, background:t.sucBg, color:t.sucT, display:'flex', alignItems:'center', gap:6 }}>
            {Ic.check(t.sucT)} {m.statusText}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══ Automations ═══ */
const AUTOS = [
  { ic:'⚙', l:'批量修改圆角', lE:'Batch Fillet', d:'统一修改装配体中所有圆角半径' },
  { ic:'📐', l:'导出 PDF', lE:'Export PDF', d:'将当前零件工程图导出' },
  { ic:'🔩', l:'插入标准件', lE:'Insert Fastener', d:'搜索并插入螺栓螺母' },
  { ic:'📦', l:'批量重命名', lE:'Batch Rename', d:'按规则批量重命名零件' },
  { ic:'🔄', l:'镜像装配体', lE:'Mirror Assembly', d:'执行镜像操作' },
  { ic:'📊', l:'BOM 导出', lE:'Export BOM', d:'导出物料清单到 Excel' },
];

function Automations({ t }) {
  return (
    <div style={{ flex:1, overflowY:'auto', padding:'20px 24px' }}>
      <p style={{ color:t.tSec, fontSize:13, marginBottom:16 }}>常用操作 Quick Actions</p>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {AUTOS.map((a, i) => (
          <button key={i} style={{ padding:'16px', borderRadius:10, border:`1px solid ${t.cBorder}`, background:t.card, cursor:'pointer', textAlign:'left', fontFamily:'inherit', transition:'border-color 0.15s' }}
            onMouseEnter={e => e.currentTarget.style.borderColor = t.accent + '55'}
            onMouseLeave={e => e.currentTarget.style.borderColor = t.cBorder}>
            <div style={{ fontSize:20, marginBottom:8 }}>{a.ic}</div>
            <div style={{ color:t.text, fontSize:13, fontWeight:600, marginBottom:2 }}>{a.l}</div>
            <div style={{ color:t.tMut, fontSize:11, marginBottom:4 }}>{a.lE}</div>
            <div style={{ color:t.tSec, fontSize:11, lineHeight:1.5 }}>{a.d}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══ Tools List ═══ */
const TOOLS = ['create_part','create_assembly','create_sketch','draw_rectangle','draw_circle','draw_line','extrude_feature','cut_extrude','revolve_feature','create_fillet','create_chamfer','linear_pattern','circular_pattern','mirror_feature','modify_dimensions','insert_component','add_mate','export_step','export_stl','export_pdf','batch_rename','mass_properties','check_interference','bom_export','create_plane','shell_feature'];

function Tools({ t }) {
  return (
    <div style={{ flex:1, overflowY:'auto', padding:'20px 24px' }}>
      <p style={{ color:t.tSec, fontSize:13, marginBottom:14 }}>已注册 SolidWorks 工具 — {TOOLS.length} tools</p>
      <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
        {TOOLS.map((tool, i) => (
          <span key={i} style={{ padding:'6px 12px', borderRadius:6, background:t.toolBg, color:t.toolT, fontSize:12, fontFamily:"'JetBrains Mono', monospace", border:`1px solid ${t.toolB}` }}>{tool}</span>
        ))}
      </div>
    </div>
  );
}

/* ═══ Messages Data ═══ */
const MSGS = [
  { role:'assistant', content:'你好，我是 SW Copilot — SolidWorks AI 助手。\n\n用自然语言告诉我你想做什么，我来生成并执行脚本。\n\nHi, I\'m SW Copilot. Tell me what you want to do in SolidWorks.' },
  { role:'user', content:'把装配体里所有零件的圆角半径统一改成 3mm' },
  { role:'assistant', tools:['create_fillet','modify_dimensions'],
    code:'Dim swApp As SldWorks.SldWorks\nDim swModel As ModelDoc2\nSet swApp = Application.SldWorks\nSet swModel = swApp.ActiveDoc\n\nDim swFeat As Feature\nSet swFeat = swModel.FirstFeature\nDo While Not swFeat Is Nothing\n  If swFeat.GetTypeName2 = "Fillet" Then\n    swFeat.Select2 False, 0\n    swFeat.SetParameter "Radius", 0.003\n  End If\n  Set swFeat = swFeat.GetNextFeature\nLoop',
    content:'检测到 8 个圆角特征，将统一修改为 3mm。确认执行吗？',
    status:'success', statusText:'脚本已生成 Script ready' },
  { role:'user', content:'执行' },
  { role:'assistant', content:'已成功修改 8 个圆角特征的半径为 3mm。\n\nAll 8 fillet features updated to R3.',
    status:'success', statusText:'执行完成 · 8 features · 已自动备份' },
];

/* ═══ Full App ═══ */
function AppMock({ theme }) {
  const t = T[theme];
  const [tab, setTab] = useState('chat');
  const [input, setInput] = useState('');
  const [showSettings, setShowSettings] = useState(false);

  const titles = { chat:'对话 Chat', automations:'快捷自动化 Quick Actions', tools:'工具列表 Tools' };

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', background:t.bg, color:t.text, overflow:'hidden', fontFamily:"'DM Sans', -apple-system, sans-serif", borderRadius:8 }}>
      <Sidebar t={t} theme={theme} activeTab={tab} onTab={setTab} onSettings={() => setShowSettings(true)} onTheme={() => {}} />

      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        <div style={{ height:48, borderBottom:`1px solid ${t.sBorder}`, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px', flexShrink:0, background:t.hdr }}>
          <span style={{ fontSize:13, color:t.tSec, fontWeight:500 }}>{titles[tab]}</span>
          {tab === 'chat' && <button style={{ background:'none', border:`1px solid ${t.cBorder}`, color:t.tMut, padding:'4px 10px', borderRadius:6, cursor:'pointer', fontSize:11, fontFamily:'inherit' }}>清空 Clear</button>}
        </div>

        {tab === 'chat' && (
          <>
            <div style={{ flex:1, overflowY:'auto', padding:'20px 24px' }}>
              {MSGS.map((m, i) => <Msg key={i} m={m} t={t} />)}
            </div>
            <div style={{ padding:'12px 20px 16px', borderTop:`1px solid ${t.sBorder}`, flexShrink:0 }}>
              <div style={{ display:'flex', gap:8, alignItems:'flex-end', background:t.card, borderRadius:12, border:`1px solid ${t.cBorder}`, padding:'4px 4px 4px 16px' }}>
                <textarea value={input} onChange={e => setInput(e.target.value)} placeholder="描述你想在 SolidWorks 中执行的操作…" rows={1}
                  style={{ flex:1, background:'none', border:'none', color:t.text, fontSize:13, outline:'none', resize:'none', padding:'9px 0', lineHeight:1.5, fontFamily:'inherit' }} />
                <button style={{ width:36, height:36, borderRadius:9, border:'none', background: input.trim() ? t.accent : t.cAlt, color: input.trim() ? '#fff' : t.tMut, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  {Ic.send(input.trim() ? '#fff' : t.tMut)}
                </button>
              </div>
              <div style={{ textAlign:'center', marginTop:6, fontSize:10, color:t.tMut }}>Anthropic · claude-sonnet-4 · Enter 发送 / Shift+Enter 换行</div>
            </div>
          </>
        )}
        {tab === 'automations' && <Automations t={t} />}
        {tab === 'tools' && <Tools t={t} />}
      </div>

      {showSettings && (
        <div style={{ position:'absolute', inset:0, zIndex:100, display:'flex', alignItems:'center', justifyContent:'center', background:t.modal, backdropFilter:'blur(8px)' }}
          onClick={() => setShowSettings(false)}>
          <div onClick={e => e.stopPropagation()} style={{ width:480, maxHeight:'85vh', overflow:'auto', background:t.modalBg, borderRadius:16, border:`1px solid ${t.cBorder}`, boxShadow:'0 24px 80px rgba(0,0,0,0.3)', padding:'28px 32px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
              <h2 style={{ fontSize:17, fontWeight:700, color:t.text }}>设置 Settings</h2>
              <button onClick={() => setShowSettings(false)} style={{ background:'none', border:'none', color:t.tMut, fontSize:18, cursor:'pointer' }}>✕</button>
            </div>
            <div style={{ background:t.cAlt, borderRadius:8, padding:'12px 16px', marginBottom:20, border:`1px solid ${t.cBorder}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span style={{ color:t.tSec, fontSize:13 }}>SolidWorks</span>
              <span style={{ fontSize:12, fontWeight:500, color:B.green, display:'flex', alignItems:'center', gap:6 }}><Dot on={true} /> 已连接</span>
            </div>
            <div style={{ color:t.tMut, fontSize:11, fontWeight:600, marginBottom:6, letterSpacing:0.5 }}>API 协议 Protocol</div>
            <div style={{ display:'flex', gap:8, marginBottom:18 }}>
              {['Anthropic','OpenAI 兼容'].map((p, i) => (
                <button key={p} style={{ flex:1, padding:'10px 14px', borderRadius:8, cursor:'pointer', fontSize:13, fontWeight:500, border: i===0 ? `2px solid ${t.accent}` : `1px solid ${t.cBorder}`, background: i===0 ? t.aSoft : t.cAlt, color: i===0 ? t.accent : t.tSec, fontFamily:'inherit' }}>{p}</button>
              ))}
            </div>
            {['Base URL', 'API Key', '模型 Model'].map((label, i) => (
              <div key={i} style={{ marginBottom:16 }}>
                <div style={{ color:t.tMut, fontSize:11, fontWeight:600, marginBottom:6, letterSpacing:0.5 }}>{label}</div>
                <input readOnly value={['https://api.anthropic.com','••••••••••••','claude-sonnet-4-20250514'][i]} style={{ width:'100%', padding:'10px 14px', borderRadius:8, border:`1px solid ${t.cBorder}`, background:t.inBg, color:t.text, fontSize:13, outline:'none', boxSizing:'border-box', fontFamily:"'JetBrains Mono', monospace" }} />
              </div>
            ))}
            <div style={{ display:'flex', gap:10, marginTop:24 }}>
              <button style={{ flex:1, padding:'11px', borderRadius:8, border:`1px solid ${t.cBorder}`, background:t.cAlt, color:t.tSec, fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>测试 Test</button>
              <button style={{ flex:1, padding:'11px', borderRadius:8, border:'none', background:t.accent, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>保存 Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ Root: Side-by-side dark/light ═══ */
function App() {
  const [theme, setTheme] = useState('dark');

  return (
    <div style={{ width:'100vw', height:'100vh', background:'#0a0a0f', display:'flex', flexDirection:'column' }}>
      {/* Top bar */}
      <div style={{ padding:'12px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid #1e2030', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <img src="assets/icon-256.png" alt="" style={{ width:24, height:24, borderRadius:6 }} />
          <span style={{ fontSize:14, fontWeight:600, color:'#e5e7eb' }}>SW Copilot — UI Prototype v2</span>
          <span style={{ fontSize:11, color:'#6b7280', marginLeft:8 }}>Dark & Light Themes · Interactive</span>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {['dark','light'].map(th => (
            <button key={th} onClick={() => setTheme(th)} style={{
              padding:'6px 14px', borderRadius:6, border: theme === th ? '1px solid #3b82f6' : '1px solid #2a2e40',
              background: theme === th ? 'rgba(59,130,246,0.12)' : 'transparent',
              color: theme === th ? '#60a5fa' : '#6b7280',
              fontSize:12, cursor:'pointer', fontFamily:'inherit', fontWeight:500,
            }}>{th === 'dark' ? '🌙 Dark' : '☀️ Light'}</button>

        </div>

      {/* App */}
      <div style={{ flex:1, padding:16, overflow:'hidden' }}>
        <div style={{ width:'100%', height:'100%', borderRadius:10, overflow:'hidden', border:'1px solid #232636', position:'relative' }}>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
